      field: 字段
      value: 值
      add-logic: 添加逻辑
      types:
        and: >-
          逻辑与：所有条件为真时为真
        or: >-
          逻辑或：至少一个条件为真时为真
        not: >-
          逻辑非：反转条件的真值
        if: >-
          条件逻辑：如果条件为真则执行以下操作
      operators:
        equal: 检查两个值是否相等
        not-equal: 检查两个值是否不相等
        greater-than: 检查一个值是否大于另一个值
        less-than: 检查一个值是否小于另一个值
        greater-than-or-equal: 检查一个值是否大于或等于另一个值
        less-than-or-equal: 检查一个值是否小于或等于另一个值
        exists: 检查字段或值是否存在
        has: 检查对象是否具有特定属性或集合是否包含特定元素
        contains: 检查字符串是否包含另一个字符串，或数组是否包含特定元素
        begins-with: 检查字符串是否以指定子串开头
        ends-with: 检查字符串是否以指定子串结尾
        in: 检查值是否在给定集合或范围内
        not-in: 检查值是否不在给定集合或范围内
        and: 逻辑与，两个操作数都为真时为真
        or: 逻辑或，至少一个操作数为真时为真
        not: 逻辑非，反转真值
